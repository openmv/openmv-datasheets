meta:
  product_name: "AE3 Battery Shield"
  sku: "OMV-AE3-BATTERY-SHIELD-V4"
  filename: "OpenMV-AE3-Battery-Shield-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/openmv-cam/openmv-ae3/battery-shield/ae3-battery-shield-hero.jpg"

description: >
  The AE3 Battery Shield is a power and storage expansion board for the OpenMV AE3 camera.
  It provides flexible power input options including a 2.1 mm DC barrel jack accepting
  1.8 V to 5.5 V (suitable for three alkaline batteries in series), a wide-range 6 V to
  36 V input with reverse voltage protection for industrial and automotive applications, and
  a 3.7 V LiPo battery charger with 100 mA charging from either the wide-range input or
  5 V USB. The board also includes a SPI-attached microSD card socket for data logging and
  storage, addressing the AE3's lack of on-board microSD. The shield mounts directly on
  the back of the AE3 via its board-to-board connector.

target_areas: >
  Battery-powered deployments, remote sensing, field installations, data logging,
  solar-powered systems, industrial monitoring, wildlife cameras, agricultural sensing.

features:
  - label: "Low-voltage input"
    detail: "1.8–5.5 V via 2.1 mm DC barrel jack. Supports three alkaline batteries in series."
  - label: "Wide-range input"
    detail: "6–36 V input with reverse voltage protection for industrial, automotive, and solar applications."
  - label: "LiPo charger"
    detail: "3.7 V single-cell LiPo battery charger at 100 mA from wide-range input or 5 V USB."
  - label: "microSD storage"
    detail: "SPI-attached microSD card socket for data logging, image storage, and model files."
  - label: "Ultra-lightweight"
    detail: "Only 9 g, adding minimal weight to the AE3 system."

system_components:
  - title: "Power Input"
    components:
      - name: "LV PWR"
        details: "2.1 mm DC barrel jack. Accepts 1.8 V to 5.5 V input. Reverse voltage tolerant to -5.5 V. Compatible with three alkaline batteries in series (3x 1.5 V = 4.5 V nominal). Provides 3.0 V output, up to 800 mA draw."
      - name: "HV PWR"
        details: "6 V to 36 V wide-range input. Reverse voltage tolerant to -36 V. Suitable for 12 V automotive systems, 24 V industrial power, and solar panel direct connection. Provides 3.3 V output, up to 600 mA draw."
      - name: "BAT"
        details: "3.7 V 1S LiPo battery input. NOT reverse voltage tolerant. Charges at up to 100 mA from HV or USB inputs. Provides 3.0 V output, up to 800 mA draw."

  - title: "Storage"
    components:
      - name: "microSD Card"
        details: "SPI-attached microSD card socket on P0–P3 (MOSI, MISO, SCLK, SS) with power enable on P11. ~300 KB/s write, ~100 KB/s read. Provides removable storage for data logging, captured images, trained models, and MicroPython scripts."

  - title: "Compatibility"
    components:
      - name: "OpenMV AE3"
        details: "Designed for the OpenMV AE3 camera module. Mounts directly on the back of the AE3 via board-to-board connector."

  - title: "Applications"
    text: >
      The AE3 Battery Shield is ideal for battery-powered deployments, remote sensing, field
      installations, data logging, solar-powered systems, and industrial monitoring where
      flexible power input and removable storage are needed.

