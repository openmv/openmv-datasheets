meta:
  product_name: "Camera Module Extension Cable"
  sku: "OMV-CAB-FPC-V1"
  filename: "OpenMV-Camera-Module-Extension-Cable-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/camera-module-extension-cable/camera-module-extension-cable-angle-web.jpg"

description: >
  The Camera Module Extension Cable allows you to separate the camera module from the
  motherboard. The extension cable is useful for any application where you need to place the
  camera module and processor body in different locations. Make sure to connect the extension
  cable with the same orientation as shown in the product pictures. Failure to do so may
  damage some OpenMV Cam variants.

target_areas: >
  Remote camera placement, enclosures, robotics, inspection systems,
  tight-space installations.

features:
  - label: "80 mm FPC cable"
    detail: "Flexible printed circuit cable to separate camera module from motherboard."
  - label: "Broad compatibility"
    detail: "Works with all camera modules except PAG7936 MIPI sensor (PS5520 MIPI works)."
  - label: "Lightweight"
    detail: "Only 1 g."

system_components_title: "Specifications"
system_components:
  - title: "Cable Specifications"
    components:
      - name: "Length"
        details: "80 mm"
      - name: "Type"
        details: "Flexible printed circuit (FPC)"

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models."
      - name: "Supported Modules"
        details: "All camera modules including PS5520 MIPI sensor. Does NOT work with PAG7936 MIPI sensor (updated cable with better impedance control in development)."

  - title: "Applications"
    text: >
      The Camera Module Extension Cable is useful for any application where you need to place
      the camera module and processor body in different locations, such as remote camera
      placement, enclosures, robotics, inspection systems, and tight-space installations.

  - title: "Important Notes"
    components:
      - name: "Orientation"
        details: "Connect with the same orientation as shown in product pictures. Incorrect orientation may damage some OpenMV Cam variants."
      - name: "Daisy-Chaining"
        details: "Daisy chaining 80 mm cables to get a longer cable does not work."

