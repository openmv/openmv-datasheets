description: >
  Protect your OpenMV Cam H7 with the OpenMV Cam H7 Case. Made of clear plastic so you can
  see onboard LEDs, with ports for the camera, microSD card, USB connector, and shield headers.
  To remove the case, use a flat-head screwdriver to pop open the case from the two slotted
  holes on the left side.

target_areas: >
  Board protection, field deployment, handling safety.

features:
  - label: "Clear plastic"
    detail: "Transparent so onboard LEDs are visible."
  - label: "Full port access"
    detail: "Ports for camera, microSD, USB, and shield headers."
  - label: "Tool-removable"
    detail: "Remove with flat-head screwdriver via slotted holes."

system_components_title: "Specifications"
system_components:
  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "OpenMV Cam H7, H7 R2."
      - name: "Material"
        details: "Clear plastic."

  - title: "Applications"
    text: >
      The Cam H7 Case protects your OpenMV Cam H7 during field deployment, handling, and
      transport while maintaining full access to all ports and visibility of onboard LEDs.

