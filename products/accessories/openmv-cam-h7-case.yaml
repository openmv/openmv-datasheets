  - label: "Clear plastic"
    detail: "Transparent so onboard LEDs are visible."
  - label: "Full port access"
    detail: "Ports for camera, microSD, USB, and shield headers."
  - label: "Tool-removable"
    detail: "Remove with flat-head screwdriver via slotted holes."

