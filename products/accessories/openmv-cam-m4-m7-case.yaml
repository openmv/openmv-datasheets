description: >
  Protect your OpenMV Cam M4 or M7 with this case. Made of clear plastic so you can see
  onboard LEDs, with ports for the camera, microSD card, USB connector, and shield headers.
  To remove the case, use a flat-head screwdriver to pop it open from the two slotted holes
  on the left side.

target_areas: >
  Board protection, field deployment, handling safety.

