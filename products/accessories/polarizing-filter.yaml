meta:
  product_name: "Polarizing Filter"
  sku: "OMV-POLARIZING-FILTER"
  filename: "OpenMV-Polarizing-Filter-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/polarizing-filter/new-filter-angle.jpg"

description: >
  Custom-made polarizing filters designed to fit inside your OpenMV Cam's M12 lens mount,
  manufactured by Edmund Optics. Mount the polarizing filter inside of your OpenMV Cam's lens
  mount (make sure to remove the protective film from both sides). Depending on the orientation
  you mount the filter, it will filter out horizontally or vertically polarized light.

target_areas: >
  Glare reduction, reflection elimination, surface inspection, LCD screen reading,
  underwater imaging, outdoor vision.

features:
  - label: "Custom M12 fit"
    detail: "Precision-made by Edmund Optics to fit inside OpenMV Cam M12 lens mounts."
  - label: "Linear polarizer"
    detail: "Filters horizontally or vertically polarized light depending on orientation."
  - label: "Protective film"
    detail: "Remove protective film from both front and back before use."

