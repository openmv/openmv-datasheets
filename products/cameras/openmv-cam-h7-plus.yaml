meta:
  product_name: "Cam H7 Plus"
  sku: "OMV-CAM-H7-PLUS-V1 (PCB V4.1)"
  filename: "OpenMV-Cam-H7-Plus-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/openmv-cam/v4.1/new-cam-v5-angle-web.jpg"

description: >
  The OpenMV Cam H7 Plus is an enhanced version of the OpenMV Cam H7, featuring significantly
  more memory with 32 MB external SDRAM and 32 MB external QUADSPI flash. This allows for
  larger frame buffers, more complex MicroPython scripts, and higher-resolution image processing.
  It ships with the OV5640 5 MP autofocus camera module, enabling higher-resolution capture than
  the standard H7. Built around the same STM32H743II ARM Cortex-M7 processor at 480 MHz.

target_areas: >
  Machine vision, robotics, industrial automation, IoT, edge AI, TensorFlow Lite,
  high-resolution imaging, video streaming, barcode/QR scanning.

features:
  - label: "High-performance MCU"
    detail: "STM32H743II ARM Cortex-M7 processor running at 480 MHz with hardware FPU, DSP, and JPEG acceleration."
  - label: "Extended memory"
    detail: "32 MB external SDRAM and 32 MB QUADSPI flash for large frame buffers and complex scripts."
  - label: "5 MP camera"
    detail: "OV5640 autofocus camera module with up to 2592x1944 resolution. M12 lens mount."
  - label: "MicroPython + TensorFlow"
    detail: "Program vision algorithms in Python with TensorFlow Lite support for neural networks."
  - label: "Rich I/O"
    detail: "10 I/O pins with SPI, I2C, UART, CAN, ADC, DAC, PWM, and servo control. All pins are 5V tolerant."
  - label: "Connectivity"
    detail: "Full-speed USB with virtual COM port and mass storage. microSD card slot for data logging."
  - label: "Compact form factor"
    detail: "35.6 mm x 44.5 mm board size with integrated power management and LiPo battery support."

system_components:
  - title: "Microcontroller"
    components:
      - name: "STM32H743II"
        details: >
          ARM Cortex-M7 core running at 480 MHz. Features double-precision floating-point unit (FPU),
          DSP instructions, and hardware JPEG codec. Includes 2 MB on-chip flash and 1 MB SRAM.

  - title: "Memory"
    components:
      - name: "On-chip Flash"
        details: "2 MB program/storage flash memory."
      - name: "On-chip SRAM"
        details: "1 MB SRAM."
      - name: "External SDRAM"
        details: "32 MB SDRAM (32-bit bus, 100 MHz clock, 400 MB/s bandwidth) for large frame buffers and extended heap."
      - name: "External QUADSPI Flash"
        details: "32 MB QUADSPI flash (100 MHz, 4-bit DDR mode, 100 MB/s read) for additional program and data storage."
      - name: "microSD Card"
        details: "Supports microSD/microSDHC/microSDXC up to 64 GB. 4-bit SDMMC interface at up to 100 Mb/s."

  - title: "Connectivity"
    components:
      - name: "USB"
        details: "Full-speed USB 2.0 (12 Mbps) via Micro-USB connector. Enumerates as virtual COM port (CDC) and USB mass storage device (MSC) simultaneously."
      - name: "SPI"
        details: "1 SPI bus available on header, up to 80 Mb/s."
      - name: "I2C"
        details: "2 I2C buses available (I2C2 on P4/P5, I2C4 on P7/P8). Standard/Fast mode up to 1 Mb/s."
      - name: "UART"
        details: "2 UART ports (UART1 on P0/P1, UART3 on P4/P5). Up to 7.5 Mb/s."
      - name: "CAN"
        details: "1 CAN bus (CAN2 on P2/P3). Up to 1 Mb/s. Compatible with CAN FD."

  - title: "Camera System"
    components:
      - name: "Image Sensor"
        details: "OV5640 1/4-inch 5 MP CMOS image sensor with autofocus. Up to 2592x1944 resolution."
      - name: "Image Performance"
        details: "Full 5 MP JPEG capture. For machine vision: up to VGA (640x480) RGB565 or grayscale at high frame rates. TensorFlow Lite inference on captured frames."
      - name: "Lens"
        details: "2.8 mm focal length lens on standard M12 lens mount. User-replaceable with any M12 lens."
      - name: "Camera Interface"
        details: "8-bit parallel DCMI interface. Removable camera module system — compatible with OV7725, OV2640, MT9V024, MT9V034, and FLIR Lepton modules."

  - title: "LEDs"
    components:
      - name: "RGB LED"
        details: "1 user-programmable RGB LED for status indication."
      - name: "IR LEDs"
        details: "2 high-power 850 nm infrared LEDs for night vision and IR illumination applications."

  - title: "Power Management"
    components:
      - name: "VIN"
        details: "External power input, 3.6 V to 5.0 V. High-efficiency switching regulator with up to 1 A output."
      - name: "3.3 V Rail"
        details: "Regulated 3.3 V output available on header pin. Maximum 250 mA for external loads."
      - name: "LiPo Battery"
        details: "JST-SH connector for single-cell 3.7 V LiPo batteries. Integrated charging when USB is connected."
      - name: "USB Power"
        details: "Can be powered via Micro-USB."

ratings:
  - title: "Recommended Operating Conditions"
    headers: ["Symbol", "Description", "Min", "Typ", "Max", "Unit"]
    rows:
      - ["VIN", "External supply voltage", "3.6", "5.0", "5.0", "V"]
      - ["VIO", "I/O pin input (digital)", "-0.3", "—", "5.0", "V"]
      - ["VIO_A", "I/O pin input (ADC/DAC)", "-0.3", "—", "3.6", "V"]
