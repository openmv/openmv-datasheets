  power_tree:
    text: >
      The OpenMV Cam H7 Plus can be powered from three sources: the VIN pin (3.6\u20135.0 V), the Micro-USB
      connector (5 V bus power), or a single-cell LiPo battery (3.7 V nominal) via the JST-SH connector.

