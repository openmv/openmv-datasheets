functional_overview:
  board_topology:
    image: "boards/openmv-cam/v4/new-cam-v4-front.jpg"
    components:
      - ref: "U1"
        description: "STM32H743VI microcontroller (ARM Cortex-M7, 480 MHz)"
      - ref: "U2"
        description: "Camera module connector (8-bit parallel DCMI)"
      - ref: "U3"
        description: "Micro-USB connector (Full-Speed USB 2.0)"
      - ref: "U4"
        description: "microSD card slot (4-bit SDMMC)"
      - ref: "U5"
        description: "High-efficiency switching voltage regulator (3.3 V, 1 A)"
      - ref: "LED1"
        description: "User-programmable RGB LED"
      - ref: "LED2/3"
        description: "850 nm infrared LEDs (x2)"
      - ref: "J1"
        description: "Main I/O header (8 pins)"
      - ref: "J2"
        description: "Servo / control header (8 pins)"
      - ref: "J3"
        description: "SWD debug header (5 pins)"
      - ref: "BAT"
        description: "LiPo battery connector (JST-SH)"

  power_tree:
    text: >
      The OpenMV Cam H7 can be powered from three sources: the VIN pin (3.6\u20135.0 V), the Micro-USB
      connector (5 V bus power), or a single-cell LiPo battery (3.7 V nominal) via the JST-SH connector.
      A high-efficiency switching regulator converts the input voltage to 3.3 V for the MCU and peripherals
      with up to 1 A output capability. When USB is connected, the integrated battery charger charges
      the LiPo cell. The board consumes less than 150 mA during typical active operation.

