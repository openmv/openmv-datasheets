meta:
  product_name: "Cam H7"
  sku: "OMV-CAM-H7-V1 (PCB V4)"
  filename: "OpenMV-Cam-H7-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/openmv-cam/v4/new-cam-v4-front-hero.jpg"

description: >
  The OpenMV Cam H7 is a small, low-power microcontroller board which allows you to easily
  implement applications using machine vision in the real world. You program the OpenMV Cam
  in high-level Python scripts (courtesy of the MicroPython operating system) instead of C/C++.
  This makes it easier to deal with the complex outputs of machine vision algorithms and working
  with high-level data structures. But, you still have total control over your OpenMV Cam and
  its I/O pins in Python. You can easily trigger taking pictures and video on external events or
  execute machine vision algorithms to figure out how to control your I/O pins.

target_areas: >
  Machine vision, robotics, industrial automation, IoT, STEM education, rapid prototyping,
  quality inspection, object tracking, barcode/QR scanning.

features:
  - label: "High-performance MCU"
    detail: "STM32H743VI ARM Cortex-M7 processor running at 480 MHz with hardware FPU, DSP, and JPEG acceleration."
  - label: "Machine vision"
    detail: "Removable OV7725 camera module with 640x480 resolution at up to 150 FPS. M12 lens mount for interchangeable optics."
  - label: "MicroPython powered"
    detail: "Program complex vision algorithms in Python with a rich standard library and hardware abstraction."
  - label: "Rich I/O"
    detail: "10 I/O pins with SPI, I2C, UART, CAN, ADC, DAC, PWM, and servo control. All pins are 5V tolerant."
  - label: "Connectivity"
    detail: "Full-speed USB with virtual COM port and mass storage. microSD card slot for data logging."
  - label: "Compact form factor"
    detail: "35.6 mm x 44.5 mm board size weighing only 16 g with integrated power management and LiPo battery support."

system_components:
  - title: "Microcontroller"
    components:
      - name: "STM32H743VI"
        details: >
          ARM Cortex-M7 core running at 480 MHz. Features double-precision floating-point unit (FPU),
          DSP instructions, and hardware JPEG codec. Includes 2 MB on-chip flash and 1 MB SRAM.
          ART Accelerator with L1 cache for zero-wait-state execution from flash.

  - title: "Memory"
    components:
      - name: "On-chip Flash"
        details: "2 MB program/storage flash memory."
      - name: "On-chip SRAM"
        details: "1 MB SRAM (864 KB general-purpose, 128 KB DTCM, 64 KB ITCM)."
      - name: "microSD Card"
        details: "Supports microSD/microSDHC/microSDXC up to 64 GB. 4-bit SDMMC interface at up to 100 Mb/s."

  - title: "Connectivity"
    components:
      - name: "USB"
        details: "Full-speed USB 2.0 (12 Mbps) via Micro-USB connector. Enumerates as virtual COM port (CDC) and USB mass storage device (MSC) simultaneously."
      - name: "SPI"
        details: "1 SPI bus available on header, up to 80 Mb/s. Used for LCD Shield, WiFi Shield, or communication with another microcontroller."
      - name: "I2C"
        details: "2 I2C buses available (I2C2 on P4/P5, I2C4 on P7/P8). Standard/Fast mode up to 1 Mb/s."
      - name: "UART"
        details: "2 UART ports (UART1 on P0/P1, UART3 on P4/P5). Up to 7.5 Mb/s."
      - name: "CAN"
        details: "1 CAN bus (CAN2 on P2/P3). Up to 1 Mb/s. Compatible with CAN FD."

  - title: "Camera System"
    components:
      - name: "Image Sensor"
        details: "OV7725 1/4-inch CMOS image sensor with 640x480 pixel resolution."
      - name: "Image Performance"
        details: "640x480 Grayscale (8-bit) or RGB565 (16-bit). 75 FPS at 320x240 and above, 150 FPS below 320x240. Most algorithms run at 25-150 FPS depending on resolution and complexity."
      - name: "Lens"
        details: "2.8 mm focal length lens on standard M12 lens mount. User-replaceable with any M12 lens."
      - name: "Camera Interface"
        details: "8-bit parallel DCMI interface. Removable camera module system — compatible with OV2640, OV5640, MT9V024, MT9V034, and FLIR Lepton modules."

  - title: "LEDs"
    components:
      - name: "RGB LED"
        details: "1 user-programmable RGB LED for status indication."
      - name: "IR LEDs"
        details: "2 high-power 850 nm infrared LEDs for night vision and IR illumination applications."

  - title: "Power Management"
    components:
      - name: "VIN"
        details: "External power input, 3.6 V to 5.0 V. High-efficiency switching regulator with up to 1 A output."
      - name: "3.3 V Rail"
        details: "Regulated 3.3 V output available on header pin. Maximum 250 mA for external loads."
      - name: "LiPo Battery"
        details: "JST-SH connector for single-cell 3.7 V LiPo batteries. Integrated charging when USB is connected."
      - name: "USB Power"
        details: "Can be powered via Micro-USB. Provides 5 V bus power for the switching regulator."
      - name: "Power Consumption"
        details: "Less than 150 mA typical during active operation."

