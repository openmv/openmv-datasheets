  board_topology:
    image: "boards/openmv-cam/v2/new-cam-v1-front.jpg"
    components:
      - ref: "U1"
        description: "STM32F427VG microcontroller (ARM Cortex-M4, 180 MHz)"
      - ref: "U2"
        description: "Camera module connector (8-bit parallel DCMI)"
      - ref: "U3"
        description: "Micro-USB connector"
      - ref: "U4"
        description: "microSD card slot"
      - ref: "LED1"
        description: "User-programmable RGB LED"
      - ref: "LED2/3"
        description: "850 nm infrared LEDs (x2)"
      - ref: "J1"
        description: "Main I/O header (8 pins)"
      - ref: "J2"
        description: "Control / debug header (8 pins, includes SWD)"
      - ref: "BAT"
        description: "LiPo battery connector (JST-SH)"

  power_tree:
    text: >
      The OpenMV Cam M4 V1 can be powered from VIN (3.6\u20135.0 V), Micro-USB (5 V bus power),
      or a single-cell LiPo battery (3.7 V) via the JST-SH connector.

