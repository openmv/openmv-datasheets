  board_topology:
    image: "boards/openmv-cam/v3/new-cam-v3-front.jpg"
    components:
      - ref: "U1"
        description: "STM32F765VI microcontroller (ARM Cortex-M7, 216 MHz)"
      - ref: "U2"
        description: "Camera module connector (8-bit parallel DCMI)"
      - ref: "U3"
        description: "Micro-USB connector (Full-Speed USB 2.0)"
      - ref: "U4"
        description: "microSD card slot"
      - ref: "U5"
        description: "Voltage regulator (3.3 V)"
      - ref: "LED1"
        description: "User-programmable RGB LED"
      - ref: "LED2/3"
        description: "850 nm infrared LEDs (x2)"
      - ref: "J1"
        description: "Main I/O header (8 pins)"
      - ref: "J2"
        description: "Servo / control header (8 pins)"
      - ref: "J3"
        description: "SWD debug header (5 pins)"
      - ref: "BAT"
        description: "LiPo battery connector (JST-SH)"

  power_tree:
    text: >
      The OpenMV Cam M7 can be powered from three sources: the VIN pin (3.6\u20135.0 V), the Micro-USB
      connector (5 V bus power), or a single-cell LiPo battery (3.7 V nominal) via the JST-SH connector.
      A switching regulator converts the input voltage to 3.3 V for the MCU and peripherals.

