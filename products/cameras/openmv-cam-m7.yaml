meta:
  product_name: "Cam M7"
  sku: "OMV-CAM-M7-V1 (PCB V3)"
  filename: "OpenMV-Cam-M7-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/openmv-cam/v3/web-new-cam-v3-angle.jpg"

description: >
  The OpenMV Cam M7 is a small, low-power microcontroller board which allows you to easily
  implement applications using machine vision in the real world. You program the OpenMV Cam
  in high-level Python scripts (courtesy of the MicroPython operating system) instead of C/C++.
  The M7 is built around the STM32F765VI ARM Cortex-M7 processor, a significant upgrade from
  the M4-based predecessors, offering faster clock speeds and hardware floating-point for
  demanding vision algorithms.

target_areas: >
  Machine vision, robotics, industrial automation, IoT, STEM education, rapid prototyping,
  quality inspection, object tracking, barcode/QR scanning.

features:
  - label: "ARM Cortex-M7 MCU"
    detail: "STM32F765VI running at 216 MHz with hardware FPU, DSP, and 2 MB flash."
  - label: "Machine vision"
    detail: "OV7725 camera module with 640x480 resolution at up to 150 FPS. M12 interchangeable lens mount."
  - label: "MicroPython powered"
    detail: "Program complex vision algorithms in Python with a rich standard library."
  - label: "Rich I/O"
    detail: "10 I/O pins with SPI, I2C, UART, CAN, ADC, DAC, PWM, and servo control. All pins are 5V tolerant."
  - label: "Connectivity"
    detail: "Full-speed USB with virtual COM port and mass storage. microSD card slot for data logging."
  - label: "Compact form factor"
    detail: "35.6 mm x 44.5 mm board size weighing only 16 g."

system_components:
  - title: "Microcontroller"
    components:
      - name: "STM32F765VI"
        details: >
          ARM Cortex-M7 core running at 216 MHz. Features single-precision floating-point unit (FPU),
          DSP instructions, and ART Accelerator. Includes 2 MB on-chip flash and 512 KB SRAM.

  - title: "Memory"
    components:
      - name: "On-chip Flash"
        details: "2 MB program/storage flash memory."
      - name: "On-chip SRAM"
        details: "512 KB SRAM."
      - name: "microSD Card"
        details: "Supports microSD/microSDHC/microSDXC up to 64 GB. 4-bit SDMMC interface."

  - title: "Connectivity"
    components:
      - name: "USB"
        details: "Full-speed USB 2.0 (12 Mbps) via Micro-USB connector. Enumerates as virtual COM port (CDC) and USB mass storage device (MSC) simultaneously."
      - name: "SPI"
        details: "1 SPI bus available on header, up to 80 Mb/s. Used for LCD Shield, WiFi Shield, or communication with another microcontroller."
      - name: "I2C"
        details: "2 I2C buses available (I2C2 on P4/P5, I2C4 on P7/P8). Standard/Fast mode up to 1 Mb/s."
      - name: "UART"
        details: "2 UART ports (UART1 on P0/P1, UART3 on P4/P5). Up to 7.5 Mb/s."
      - name: "CAN"
        details: "1 CAN bus (CAN2 on P2/P3). Up to 1 Mb/s. No CAN FD support."

  - title: "Camera System"
    components:
      - name: "Image Sensor"
        details: "OV7725 1/4-inch CMOS image sensor with 640x480 pixel resolution."
      - name: "Image Performance"
        details: "640x480 Grayscale (8-bit) or RGB565 (16-bit). Up to 75 FPS at QVGA and above, 150 FPS below QVGA."
      - name: "Lens"
        details: "2.8 mm focal length lens on standard M12 lens mount. User-replaceable with any M12 lens."
      - name: "Camera Interface"
        details: "8-bit parallel DCMI interface. Removable camera module system \u2014 compatible with OV2640, OV5640, MT9V024, MT9V034, and FLIR Lepton modules."

  - title: "LEDs"
    components:
      - name: "RGB LED"
        details: "1 user-programmable RGB LED for status indication."
      - name: "IR LEDs"
        details: "2 high-power 850 nm infrared LEDs for night vision and IR illumination applications."

  - title: "Power Management"
    components:
      - name: "VIN"
        details: "External power input, 3.6 V to 5.0 V. High-efficiency switching regulator."
      - name: "3.3 V Rail"
        details: "Regulated 3.3 V output available on header pin. Maximum 250 mA for external loads."
      - name: "LiPo Battery"
        details: "JST-SH connector for single-cell 3.7 V LiPo batteries."
      - name: "USB Power"
        details: "Can be powered via Micro-USB. Provides 5 V bus power for the switching regulator."

ratings:
  - title: "Recommended Operating Conditions"
    headers: ["Symbol", "Description", "Min", "Typ", "Max", "Unit"]
    rows:
      - ["VIN", "External supply voltage", "3.6", "5.0", "5.0", "V"]
      - ["VOUT", "3.3 V rail output", "\u2014", "3.3", "3.3", "V"]
      - ["VIO", "I/O pin input (digital)", "-0.3", "\u2014", "5.0", "V"]
      - ["VIO_A", "I/O pin input (ADC/DAC)", "-0.3", "\u2014", "3.6", "V"]
      - ["IOUT", "3.3 V output current", "\u2014", "\u2014", "250", "mA"]
      - ["TOP", "Operating temperature", "-40", "25", "105", "\u00B0C"]

