functional_overview:
  power_tree:
    text: >
      The OpenMV Cam RT1062 can be powered from USB-C (1.5 A limited), VIN (3.6\u20135.0 V with
      LM66200 reverse protection), RAW (always-on, active in all power modes), or a 3.7 V LiPo
      battery (BQ24075 charger, 100 mA fast charge). The AP61300 step-down converter and
      TCR2LE31 LDO provide regulated 3.3 V. Deepsleep current is less than 30 \u00B5A with
      on-board RTC. Power button supports hold-to-off (5s) and press-to-wake (1s).

