meta:
  product_name: "Cam M4 V2"
  sku: "OMV-CAM-M4-V2 (PCB V2.1)"
  filename: "OpenMV-Cam-M4-V2-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/openmv-cam/v2.1/new-cam-v2-angle.jpg"

description: >
  The OpenMV Cam M4 V2 (OV7725) is a small, low-power microcontroller board
  which allows you to easily implement applications using machine vision in the real world.
  Built around the STM32F427VG ARM Cortex-M4 processor, it was the second generation of the
  OpenMV Cam product line. You program the OpenMV Cam in high-level Python scripts courtesy
  of the MicroPython operating system.

target_areas: >
  Machine vision, robotics, education, rapid prototyping, object tracking, color detection.

features:
  - label: "ARM Cortex-M4 MCU"
    detail: "STM32F427VG running at 180 MHz with hardware FPU and 1 MB flash."
  - label: "Machine vision"
    detail: "OV7725 camera module with 640x480 resolution. M12 interchangeable lens mount."
  - label: "MicroPython powered"
    detail: "Program vision algorithms in Python with a rich standard library."
  - label: "I/O"
    detail: "9 I/O pins with SPI, I2C, UART, CAN, ADC, DAC, PWM, and 2 servo pins. All pins are 5V tolerant."
  - label: "Connectivity"
    detail: "Full-speed USB with virtual COM port and mass storage. microSD card slot."
  - label: "Compact"
    detail: "35.6 mm x 44.5 mm board size weighing only 16 g."

system_components:
  - title: "Microcontroller"
    components:
      - name: "STM32F427VG"
        details: >
          ARM Cortex-M4 core running at 180 MHz. Features single-precision floating-point unit (FPU)
          and DSP instructions. Includes 1 MB on-chip flash and 256 KB SRAM.

  - title: "Memory"
    components:
      - name: "On-chip Flash"
        details: "1 MB program/storage flash memory."
      - name: "On-chip SRAM"
        details: "256 KB SRAM."
      - name: "microSD Card"
        details: "Supports microSD/microSDHC up to 32 GB."

  - title: "Connectivity"
    components:
      - name: "USB"
        details: "Full-speed USB 2.0 (12 Mbps) via Micro-USB connector. Enumerates as virtual COM port (CDC) and USB mass storage device (MSC) simultaneously."
      - name: "SPI"
        details: "1 SPI bus available on header, up to 45 Mb/s. Used for LCD Shield, WiFi Shield, or communication with another microcontroller."
      - name: "I2C"
        details: "1 I2C bus available (I2C2 on P4/P5). Standard/Fast mode up to 1 Mb/s."
      - name: "UART"
        details: "1 UART port (UART3 on P4/P5). Up to 7.5 Mb/s."
      - name: "CAN"
        details: "1 CAN bus (CAN2 on P2/P3). Up to 1 Mb/s."

  - title: "Camera System"
    components:
      - name: "Image Sensor"
        details: "OV7725 1/4-inch CMOS image sensor."
      - name: "Image Performance"
        details: "320x240 Grayscale (8-bit) or RGB565 (16-bit). 75 FPS at 320x240, 150 FPS below. Limited to QVGA by available SRAM."
      - name: "Lens"
        details: "2.8 mm focal length lens on standard M12 lens mount. User-replaceable."
      - name: "Camera Interface"
        details: "8-bit parallel DCMI interface. Removable camera module system."

  - title: "LEDs"
    components:
      - name: "RGB LED"
        details: "1 user-programmable RGB LED for status indication."
      - name: "IR LEDs"
        details: "2 high-power 850 nm infrared LEDs."

  - title: "Power Management"
    components:
      - name: "VIN"
        details: "External power input, 3.6 V to 5.0 V."
      - name: "3.3 V Rail"
        details: "Regulated 3.3 V output. Maximum 250 mA for external loads."
      - name: "LiPo Battery"
        details: "JST-SH connector for single-cell 3.7 V LiPo batteries."
      - name: "USB Power"
        details: "Can be powered via Micro-USB."

ratings:
  - title: "Recommended Operating Conditions"
    headers: ["Symbol", "Description", "Min", "Typ", "Max", "Unit"]
    rows:
      - ["VIN", "External supply voltage", "3.6", "5.0", "5.0", "V"]
      - ["VOUT", "3.3 V rail output", "—", "3.3", "3.3", "V"]
      - ["VIO", "I/O pin input (digital)", "-0.3", "—", "5.0", "V"]
      - ["IOUT", "3.3 V output current", "—", "—", "250", "mA"]
      - ["TOP", "Operating temperature", "-40", "25", "105", "\u00B0C"]

