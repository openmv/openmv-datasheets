        - ["3", "P2", "I/O", "SPI2 SCLK (PB13)"]
        - ["4", "P3", "I/O", "SPI2 SS (PB12)"]
        - ["5", "P4", "I/O", "I2C2 SCL (PB10)"]
        - ["6", "P5", "I/O", "I2C2 SDA (PB11)"]
        - ["7", "P6", "I/O", "DAC / ADC (PA5)"]
        - ["8", "3V3", "Power", "3.3 V regulated output (250 mA max)"]

    - title: "J2 Header (Servo / Control)"
