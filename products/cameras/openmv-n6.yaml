meta:
  product_name: "N6"
  sku: "OMV-N6-V1"
  filename: "OpenMV-N6-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/openmv-cam/openmv-n6/final/n6-hero-v6.jpg"

description: >
  The OpenMV N6 is the latest generation of the OpenMV Cam product line, built around the
  STM32N657A0 ARM Cortex-M55 running at 800 MHz with a 600 GOPS neural processing unit (NPU).
  It delivers real-time YOLO object detection at 30+ FPS entirely on-device. With 64 MB RAM,
  32 MB flash, a 5 MP HDR camera (default), integrated WiFi/BLE, Gigabit Ethernet, IMU,
  microphone, and GPU with H.264/JPEG video recording, it is the most capable OpenMV Cam ever
  built. Supports interchangeable camera modules including global shutter, FLIR thermal, and
  Prophesee event cameras. Programmable in MicroPython via the OpenMV IDE with Edge Impulse
  integration.

target_areas: >
  Edge AI, machine vision, object detection, thermal imaging, multispectral imaging,
  video streaming, industrial automation, robotics, security, smart agriculture.

features:
  - label: "800 MHz Cortex-M55"
    detail: "STM32N657A0 with Helium vector acceleration and 600 GOPS NPU. Real-time YOLO at 30+ FPS."
  - label: "Massive memory"
    detail: "64 MB RAM (800 MB/s) and 32 MB flash (400 MB/s)."
  - label: "5 MP HDR camera"
    detail: "Default 5 MP 30 FPS HDR sensor. Swappable with 1 MP global shutter (up to 480 FPS), FLIR thermal, or event camera."
  - label: "GPU + video"
    detail: "On-board GPU with H.264/JPEG video recording."
  - label: "Gigabit Ethernet"
    detail: "Built-in Gigabit Ethernet with differential pairs on header."
  - label: "WiFi + BLE"
    detail: "2.4 GHz WiFi and Bluetooth Low Energy 5.2 integrated."
  - label: "Rich I/O"
    detail: "18 GPIO pins with SPI, I2C, I3C, CAN, 2x UART, ADC, 4x PWM. USB-C High-Speed."
  - label: "Ultra-low power"
    detail: "Less than 50 \u00B5A deepsleep. 4+ year battery life possible."

system_components:
  - title: "Microcontroller"
    components:
      - name: "STM32N657A0"
        details: >
          ARM Cortex-M55 core running at 800 MHz with Helium/MVE vector acceleration and ARM
          Helium Accelerated CV Library. Integrated 600 GOPS neural processing unit (NPU) for
          on-device AI inference. On-board GPU with H.264/JPEG video encoding.

  - title: "Memory"
    components:
      - name: "RAM"
        details: "64 MB at 800 MB/s bandwidth."
      - name: "Flash"
        details: "32 MB at 400 MB/s bandwidth."
      - name: "microSD Card"
        details: "Supports SD (up to 2 GB), SDHC (up to 32 GB), SDXC (up to 2 TB). UHS-I interface."

  - title: "Connectivity"
    components:
      - name: "USB-C"
        details: "USB 2.0 High-Speed (480 Mbps)."
      - name: "Gigabit Ethernet"
        details: "Gigabit Ethernet with differential pairs (TXP/TXN, RXP/RXN, DCP/DCN, DDP/DDN) exposed on left header."
      - name: "WiFi"
        details: "2.4 GHz WiFi."
      - name: "Bluetooth"
        details: "Bluetooth Low Energy 5.2."
      - name: "SPI"
        details: "SPI bus on P0 (MOSI) / P1 (MISO) / P2 (SCLK) / P3 (SS)."
      - name: "I2C"
        details: "I2C bus on P4 (SCL) / P5 (SDA)."
      - name: "I3C"
        details: "I3C bus supported."
      - name: "CAN"
        details: "CAN bus on P2 (CTX) / P3 (CRX)."
      - name: "UART"
        details: "2 UART ports: P4 (TX) / P5 (RX) and P14 (TX) / P13 (RX)."

  - title: "Camera System"
    components:
      - name: "Default Sensor"
        details: "5 MP 30 FPS HDR camera."
      - name: "Alternative Sensors"
        details: "1 MP 120/240/480 FPS color global shutter camera, FLIR Boson/Lepton thermal camera, Prophesee GENX320 event camera."
      - name: "Lens"
        details: "M12 (S-mount) interchangeable lens mount."

  - title: "Sensors"
    components:
      - name: "IMU"
        details: "On-board inertial measurement unit (accelerometer and gyroscope)."
      - name: "Microphone"
        details: "On-board microphone for audio input."

  - title: "User Interface"
    components:
      - name: "RGB LED"
        details: "User-programmable RGB LED."
      - name: "Buttons"
        details: "Main button (SW) and wakeup button (SW2) for deepsleep wakeup."

  - title: "Power Management"
    components:
      - name: "RAW"
        details: "Always-on unregulated 3.6\u20135 V power input. Active in on, off, and deepsleep modes."
      - name: "VIN"
        details: "5 V regulated power input on right header."
      - name: "3.3 V Rail"
        details: "Regulated 3.3 V output, 1 A supply max."
      - name: "LiPo Battery"
        details: "3.7 V LiPo battery charger integrated."
      - name: "Deepsleep"
        details: "Less than 50 \u00B5A deepsleep current. Greater than 4 year battery life possible. PWR-WKUP pin for wakeup."

ratings:
  - title: "Recommended Operating Conditions"
    headers: ["Symbol", "Description", "Min", "Typ", "Max", "Unit"]
    rows:
      - ["VRAW", "RAW supply voltage", "3.6", "\u2014", "5.0", "V"]
      - ["VIN", "VIN supply voltage", "\u2014", "5.0", "5.0", "V"]
      - ["VIO", "I/O voltage", "\u2014", "3.3", "3.3", "V"]
      - ["IIO", "Per-pin current (sink/source)", "\u2014", "\u2014", "20", "mA"]
      - ["IOUT", "3.3 V rail max current", "\u2014", "\u2014", "1000", "mA"]
      - ["ISLEEP", "Deepsleep current", "\u2014", "\u2014", "50", "\u00B5A"]
      - ["TOP", "Operating temperature", "-40", "25", "85", "\u00B0C"]

