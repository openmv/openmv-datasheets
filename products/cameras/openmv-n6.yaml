  power_tree:
    text: >
      The OpenMV N6 can be powered from RAW (3.6\u20135 V, always-on), VIN (5 V), USB-C,
      or a 3.7 V LiPo battery with integrated charging. The RAW pin remains active in all
      power modes including off and deepsleep. Deepsleep current is less than 50 \u00B5A,
      enabling battery life of 4+ years in sleep-heavy applications.

