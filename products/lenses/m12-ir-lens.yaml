meta:
  product_name: "IR Lens"
  sku: "IR-Lens / 3.6mm-IR-Lens"
  filename: "OpenMV-IR-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/ir-lens/new-ir-angle-quarter.jpg"

description: >
  This lens gives your OpenMV Cam the ability to see IR light. The standard lens that ships
  with your OpenMV Cam has a 650 nm IR cut filter that blocks IR light. This lens does not
  have an IR cut filter, so it will not filter out IR light. The optics are otherwise identical
  to the stock lenses that ship with OpenMV cameras \u2014 available in 2.8 mm (for cameras that
  ship with a 2.8 mm lens) and 3.6 mm (for cameras that ship with a 3.6 mm lens) variants.
  The FOV and zoom are the same as the standard lens for each camera.

target_areas: >
  IR light tracking, eye tracking, night vision, IR illumination applications,
  pupil detection, IR beacon tracking.

features:
  - label: "No IR cut filter"
    detail: "Passes infrared light for IR-sensitive imaging applications."
  - label: "Two focal lengths"
    detail: "Available in 2.8 mm (1/3\" format) and 3.6 mm (1/2.5\" format) variants."
  - label: "F2.0 aperture"
    detail: "Fast aperture for good low-light and IR performance."
  - label: "M12 x 0.5 mount"
    detail: "Standard M12 threaded mount compatible with all OpenMV Cam models."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD."

