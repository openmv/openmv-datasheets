  - title: "Applications"
    text: >
      The Super Telephoto Lens is great for any application where you need your OpenMV Cam to
      really zoom in on some subject. For example, the super telephoto lens makes it easy to
      do eye-tracking with IR light by zooming in on someone's eye, making it easier to
      determine the direction their pupil is pointing.

