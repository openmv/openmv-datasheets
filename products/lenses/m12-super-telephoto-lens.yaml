meta:
  product_name: "Super Telephoto Lens"
  sku: "Super-Telephoto-Lens-with-IR-Cut-Filter / Super-Telephoto-Lens"
  filename: "OpenMV-Super-Telephoto-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/super-telephoto-lens/new-super-telephoto-front.jpg"

description: >
  This lens gives your OpenMV Cam the ability to see longer distances with extreme zoom. The
  standard lens has about a 70-degree FOV which allows your camera to see more things, but
  with less detail. This lens has about a 10-degree FOV, providing about a 9x zoom on any
  particular object. Available with or without a 650 nm IR cut filter.

target_areas: >
  Extreme long-range detection, eye tracking with IR, surveillance corridors,
  wildlife monitoring, traffic monitoring, industrial inspection at distance.

features:
  - label: "~10-degree FOV (9x zoom)"
    detail: "Up to 8.93x optical zoom with OV7725. Highest zoom in M12 lineup."
  - label: "25 mm focal length"
    detail: "F2.0 aperture, 1/3\" image format."
  - label: "M12 x 0.5 mount"
    detail: "Standard M12 threaded mount compatible with all OpenMV Cam models."
  - label: "Multi-sensor compatible"
    detail: "FOV data for PS5520, PAG7936, MT9M114, MT9V024/034, OV7725, OV5640, and OV2640."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD."

