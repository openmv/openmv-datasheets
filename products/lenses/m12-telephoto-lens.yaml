meta:
  product_name: "Telephoto Lens"
  sku: "Telephoto-Lens / IR-Telephoto-Lens"
  filename: "OpenMV-Telephoto-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/telephoto-lens/new-telephoto-front.jpg"

description: >
  This lens gives your OpenMV Cam the ability to see longer distances (zoom in). The standard
  lens that ships with your OpenMV Cam has about a 70-degree FOV which allows your camera to
  see more things, but with less detail. This lens has about a 20-degree FOV, providing about
  a 4x zoom on any particular object. Available with or without a 650 nm IR cut filter.

target_areas: >
  Long-range detection, eye tracking, zoom applications, quality inspection,
  wildlife monitoring, perimeter security.

features:
  - label: "~20-degree FOV (4x zoom)"
    detail: "Up to 4.29x optical zoom with OV7725. Enables long-range detail resolution."
  - label: "12 mm focal length"
    detail: "F2.0 aperture, 1/3\" image format."
  - label: "M12 x 0.5 mount"
    detail: "Standard M12 threaded mount compatible with all OpenMV Cam models."
  - label: "Multi-sensor compatible"
    detail: "FOV data for PS5520, PAG7936, MT9M114, MT9V024/034, OV7725, OV5640, and OV2640."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD."

