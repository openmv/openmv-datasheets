  - title: "Applications"
    text: >
      The Telephoto Lens is great for any application where you need your OpenMV Cam to zoom
      in on some subject. For example, the telephoto lens makes it easy to do eye-tracking
      without IR light by zooming in on someone's eye, making it easier to determine the
      direction their pupil is pointing.

