meta:
  product_name: "Ultra Wide Angle Lens"
  sku: "Ultra-Wide-Angle-Lens / IR-Ultra-Wide-Angle-Lens"
  filename: "OpenMV-Ultra-Wide-Angle-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/ultra-wide-angle-lens/new-ultra-wide-angle-angle-quarter.jpg"

description: >
  This lens gives your OpenMV Cam the ability to see a wider field of view. The standard lens
  that ships with your OpenMV Cam has about a 70-degree FOV which is good, but not great for
  security applications. This lens has about a 100-degree FOV, so your OpenMV Cam can see
  much more around itself. Available with or without a 650 nm IR cut filter.

target_areas: >
  Security, motion detection, room monitoring, wide-area surveillance, robotics, navigation.

features:
  - label: "~100-degree FOV"
    detail: "Up to 129\u00B0 diagonal depending on sensor. 0.47\u20130.60x optical zoom vs. standard lens."
  - label: "M12 x 0.5 mount"
    detail: "Standard M12 threaded mount compatible with all OpenMV Cam models."
  - label: "Multi-sensor compatible"
    detail: "FOV data for PS5520, PAG7936, MT9M114, MT9V024/034, OV7725, OV5640, and OV2640."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD."

