  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "OpenMV AE3, dual-camera modules using PAG7936 sensors."
      - name: "Installation"
        details: "Includes damping grease. Gluing recommended for vibration environments. M8 lock ring solution in development."

  - title: "Applications"
    text: >
      The M8 Fish Eye Lens is great for security applications where you want to see nearly a
      fish-eye field of view. By using this lens, your OpenMV AE3 can easily detect things to
      the left and right of what the camera is looking at.

