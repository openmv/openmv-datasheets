meta:
  product_name: "M8 Fish Eye Lens"
  sku: "IR-M8-Fish-Eye-Lens / M8-Fish-Eye-Lens"
  filename: "OpenMV-M8-Fish-Eye-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/fish-eye-lens/m8/fish-eye-m8-hero.jpg"

description: >
  The M8 Fish Eye Lens gives your OpenMV AE3 the ability to see with nearly a fish-eye field
  of view. The standard lens has about a 70-degree FOV which is good, but not great for
  security applications. This lens has about a 120-degree FOV, so your OpenMV AE3 can see
  much more. The fish-eye barrel distortion can be corrected in software using OpenMV's lens
  correction algorithms. The lens comes with damping grease; gluing is recommended for
  vibration environments. Available with or without a 650 nm IR cut filter.

target_areas: >
  Wide-area surveillance, panoramic monitoring, robotics, drone navigation,
  indoor mapping, 360-degree coverage.

features:
  - label: "120-degree FOV"
    detail: "Approximately 120-degree diagonal FOV (108.1\u00B0H x 82.3\u00B0V with PAG7936). 0.44x optical zoom. Widest in M8 lineup."
  - label: "Software distortion correction"
    detail: "-18% TV distortion correctable via OpenMV's lens undistortion algorithms."
  - label: "VGA resolution"
    detail: "Optimized for VGA-class sensor resolution."
  - label: "M8 x P0.35 mount"
    detail: "Standard M8 threaded mount for OpenMV AE3 and PAG7936 dual-camera modules."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without for night vision use."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD for mechanical integration."

