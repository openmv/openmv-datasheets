  - title: "Applications"
    text: >
      The M8 Super Telephoto Lens is great for any application where you need your OpenMV AE3
      to really zoom in on a subject. For example, the lens makes it easy to do eye-tracking by
      zooming in on someone's eye, making it easier to determine the direction their pupil is
      pointing.

