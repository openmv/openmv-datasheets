meta:
  product_name: "M8 Super Telephoto Lens"
  sku: "IR-M8-Super-Telephoto-Lens / M8-Super-Telephoto-Lens"
  filename: "OpenMV-M8-Super-Telephoto-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/super-telephoto-lens/m8/super-telephot-lens-m8-hero.jpg"

description: >
  The M8 Super Telephoto Lens gives your OpenMV AE3 the ability to see longer distances with
  a super zoom. The standard lens has about a 70-degree FOV which allows your camera to see
  more things, but with less detail. This lens has about a 25-degree FOV, providing a 3.4x
  super zoom on any particular object — the highest magnification in the M8 lineup. The lens
  comes with damping grease; gluing is recommended for vibration environments. Available with
  or without a 650 nm IR cut filter.

target_areas: >
  Extreme long-range detection, eye tracking, surveillance corridors, wildlife monitoring,
  industrial inspection at distance, traffic monitoring.

features:
  - label: "25-degree FOV (3.4x zoom)"
    detail: "24.4\u00B0 diagonal / 20.8\u00B0H / 13.1\u00B0V with PAG7936. 3.4x optical zoom — highest in M8 lineup."
  - label: "Very low distortion"
    detail: "Only -0.7% TV distortion for clean images."
  - label: "8 MP resolution"
    detail: "Supports up to 8 MP sensor resolution — highest resolving power in M8 lineup."
  - label: "High relative illumination"
    detail: ">89% relative illumination for uniform brightness across the image."
  - label: "M8 x P0.35 mount"
    detail: "Standard M8 threaded mount for OpenMV AE3 and PAG7936 dual-camera modules."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without for night vision use."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD for mechanical integration."

