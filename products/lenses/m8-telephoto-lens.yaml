meta:
  product_name: "M8 Telephoto Lens"
  sku: "IR-M8-Telephoto-Lens / M8-Telephoto-Lens"
  filename: "OpenMV-M8-Telephoto-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/telephoto-lens/m8/telephoto-lens-m8-hero.jpg"

description: >
  The M8 Telephoto Lens gives your OpenMV AE3 the ability to see longer distances. The
  standard lens has about a 70-degree FOV which allows your camera to see more things, but
  with less detail. This lens has about a 55-degree FOV, providing about a 1.4x zoom on any
  particular object. The lens comes with damping grease; gluing is recommended for vibration
  environments. Available with or without a 650 nm IR cut filter.

target_areas: >
  Long-range detection, eye tracking, license plate reading, quality inspection,
  wildlife monitoring, perimeter security.

features:
  - label: "55-degree FOV (1.4x zoom)"
    detail: "54.2\u00B0 diagonal / 47.0\u00B0H / 30.4\u00B0V with PAG7936. 1.43x optical zoom."
  - label: "Ultra-low distortion"
    detail: "Only -0.4% TV distortion for clean, undistorted images."
  - label: "2 MP resolution"
    detail: "Supports up to 2 MP sensor resolution."
  - label: "M8 x P0.35 mount"
    detail: "Standard M8 threaded mount for OpenMV AE3 and PAG7936 dual-camera modules."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without for night vision use."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD for mechanical integration."

