  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "OpenMV AE3, dual-camera modules using PAG7936 sensors."
      - name: "Installation"
        details: "Includes damping grease. Gluing recommended for vibration environments. M8 lock ring solution in development."

  - title: "Applications"
    text: >
      The M8 Telephoto Lens is great for any application where you need your OpenMV AE3 to
      zoom in on some subject. For example, the telephoto lens makes it easy to do eye-tracking
      by zooming in on someone's eye, making it easier to determine the direction their pupil
      is pointing.

