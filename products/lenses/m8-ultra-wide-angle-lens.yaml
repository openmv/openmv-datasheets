meta:
  product_name: "M8 Ultra Wide Angle Lens"
  sku: "IR-M8-Ultra-Wide-Angle-Lens / M8-Ultra-Wide-Angle-Lens"
  filename: "OpenMV-M8-Ultra-Wide-Angle-Lens-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/ultra-wide-angle-lens/m8/ultra-wide-angle-m8-hero.jpg"

description: >
  The M8 Ultra Wide Angle Lens gives your OpenMV AE3 the ability to see a wider field of view.
  The standard lens has about a 70-degree FOV which is good, but not great for security
  applications. This lens has about a 90-degree FOV, so your OpenMV AE3 can see much more
  without significant image distortion. The lens comes with damping grease to help hold it
  in place; gluing is recommended for vibration environments. Available with or without a
  650 nm IR cut filter.

target_areas: >
  Security, surveillance, wide-area monitoring, room coverage, robotics, navigation,
  indoor monitoring, people counting.

features:
  - label: "90-degree FOV"
    detail: "Approximately 90-degree diagonal FOV (79.6\u00B0H x 55.2\u00B0V with PAG7936). 0.74x optical zoom."
  - label: "Low distortion"
    detail: "Only -2% TV distortion \u2014 wide angle with minimal barrel distortion."
  - label: "2 MP resolution"
    detail: "Supports up to 2 MP sensor resolution."
  - label: "M8 x P0.35 mount"
    detail: "Standard M8 threaded mount for OpenMV AE3 and PAG7936 dual-camera modules."
  - label: "IR cut filter option"
    detail: "Available with 650 nm IR cut filter or without for night vision use."
  - label: "3D model available"
    detail: "STEP file available on GrabCAD for mechanical integration."

