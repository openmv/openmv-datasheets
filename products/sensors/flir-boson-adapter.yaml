description: >
  The FLIR Boson Adapter Module allows your OpenMV Cam to interface with the FLIR Boson and
  Boson+ thermal imaging sensors for thermal vision applications. The actual FLIR Boson/Boson+
  camera sensor is sold separately via the GroupGets Store. FLIR Boson camera sensors are
  export controlled. The adapter board comes with 4x M1.6 5 mm Philips head screws for
  attaching to the FLIR Boson camera module.

target_areas: >
  Thermal imaging, long-range thermal detection, industrial thermography,
  search and rescue, security, predictive maintenance.

features:
  - label: "FLIR Boson/Boson+ compatible"
    detail: "Interfaces with FLIR Boson and Boson+ thermal imaging sensors."
  - label: "Includes mounting hardware"
    detail: "4x M1.6 5 mm Philips head screws for Boson attachment."
  - label: "Multiple camera support"
    detail: "Works with OpenMV N6, RT1062, and H7 Plus."

system_components_title: "Specifications"
system_components:
  - title: "Thermal Sensor Interface"
    components:
      - name: "Supported Sensors"
        details: "FLIR Boson and FLIR Boson+ thermal imaging sensors (sold separately via GroupGets)."
      - name: "Mounting"
        details: "Includes 4x M1.6 5 mm Philips head screws for attaching adapter to FLIR Boson module."
      - name: "Export Control"
        details: "FLIR Boson/Boson+ sensors are export controlled."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "OpenMV N6, OpenMV Cam RT1062, and OpenMV Cam H7 Plus."

