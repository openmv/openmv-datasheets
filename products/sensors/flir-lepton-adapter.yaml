  cover_image: "boards/openmv-cam/v4/LEPTON/LEPTON-module-angle-web.jpg"

description: >
  The FLIR Lepton Adapter Module allows your OpenMV Cam to interface with the FLIR Lepton
  1/2/3 thermal imaging sensors for thermal vision applications. The actual FLIR Lepton
  camera sensor is sold separately via the GroupGets Store. FLIR Lepton camera sensors are
  export controlled. The module is compatible with all modular OpenMV Cam base boards.

target_areas: >
  Thermal imaging, temperature measurement, night vision, HVAC diagnostics,
  industrial inspection, security, predictive maintenance.

features:
  - label: "FLIR Lepton 1/2/3"
    detail: "Supports FLIR Lepton 1, 2, and 3 thermal imaging sensors (sold separately)."
  - label: "Universal compatibility"
    detail: "Works with all modular OpenMV Cam base boards."
  - label: "Two versions"
    detail: "V1 and V2 adapter boards available."

