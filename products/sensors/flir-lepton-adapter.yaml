meta:
  product_name: "FLIR Lepton Adapter Module"
  sku: "OMV-MOD-LEPTON-V1 / OMV-MOD-LEPTON-V2"
  filename: "OpenMV-FLIR-Lepton-Adapter-Module-Datasheet.pdf"
