description: >
  The Global Shutter Camera Module enables your OpenMV Cam to capture high-quality grayscale
  images without motion blur. The module features the MT9V034 (or MT9V024) global shutter
  camera, capable of taking snapshot pictures on demand and running at 80 FPS in QVGA mode,
  200 FPS in QQVGA mode, and 400 FPS in QQQVGA mode. The Global Shutter Camera Module is
  the ultimate sensor for machine vision enthusiasts who want to use their OpenMV Cam in
  professional products.

target_areas: >
  High-speed capture, motion-blur-free imaging, barcode scanning, industrial inspection,
  professional machine vision, robotics, conveyor tracking.

features:
  - label: "Global shutter"
    detail: "Captures entire frame simultaneously \u2014 no rolling shutter distortion or motion blur."
  - label: "Up to 400 FPS"
    detail: "80 FPS (QVGA), 200 FPS (QQVGA), 400 FPS (QQQVGA)."
  - label: "Grayscale output"
    detail: "High-quality grayscale imaging optimized for machine vision."
  - label: "Two chip variants"
    detail: "Available with MT9V034 or MT9V024 sensor."
  - label: "Universal compatibility"
    detail: "Works with all modular OpenMV Cam base boards."

