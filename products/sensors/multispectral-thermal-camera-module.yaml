description: >
  The Multispectral Thermal Camera Module allows your OpenMV Cam to interface with the FLIR
  Lepton 1/2/3 thermal imaging sensors for thermal vision applications and interface with a
  color camera sensor at the same time. Now you can process thermal images mixed with color
  simultaneously. Available in two variants: PAG7936 1 MP 120 FPS color global shutter (N6 only)
  or OV5640 5 MP color rolling shutter (RT1062). The FLIR Lepton sensor is sold separately
  via GroupGets.

target_areas: >
  Thermal imaging, multispectral vision, temperature measurement, HVAC diagnostics,
  industrial inspection, security, firefighting, predictive maintenance.

features:
  - label: "Dual imaging"
    detail: "Simultaneous FLIR Lepton thermal + color camera (PAG7936 or OV5640)."
  - label: "FLIR Lepton 1/2/3"
    detail: "Supports Lepton 1, 2, and 3 thermal modules (sold separately via GroupGets)."
  - label: "Two color sensor options"
    detail: "PAG7936 1 MP 120 FPS global shutter (N6) or OV5640 5 MP rolling shutter (RT1062)."

system_components_title: "Specifications"
system_components:
  - title: "Thermal Sensor"
    components:
      - name: "FLIR Lepton Socket"
        details: "Supports FLIR Lepton 1, 2, and 3 thermal imaging sensors. Sensor sold separately via GroupGets."

  - title: "Color Camera \u2014 PAG7936 Variant"
    components:
      - name: "Sensor"
        details: "PAG7936 1 MP color global shutter sensor at 120 FPS."
      - name: "Compatibility"
        details: "OpenMV N6 only."

  - title: "Color Camera \u2014 OV5640 Variant"
    components:
