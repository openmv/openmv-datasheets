description: >
  The OV5640 FPC Camera Module gives you the same high-resolution JPEG-taking capabilities as
  the OpenMV Cam H7 Plus and RT1062's OV5640 camera module in a low-profile form factor with
  autofocus support. The OV5640 image sensor can capture 2592x1944 (5 MP) images. The sensor
  supports Grayscale, RGB565, JPEG, YUV422, and Bayer image formats. Depending on the
  resolution, you can achieve up to 120 FPS frame rates.

target_areas: >
  High-resolution imaging, JPEG capture, autofocus applications, low-profile installations,
  barcode scanning, document capture, quality inspection.

