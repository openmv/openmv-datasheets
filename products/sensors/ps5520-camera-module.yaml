description: >
  The PS5520 is a highly integrated CMOS image sensor that outputs 2592x1944 (5 MP) pixels
  with a rolling shutter readout. It features FinePixel and HDR sensor technology for excellent
  image quality and single-shot high dynamic range synthesized image output. VGA (640x480),
  HD (1280x720), and FHD (1920x1080) are operational at 30 FPS with HDR support.

target_areas: >
  High-resolution imaging, HDR applications, outdoor vision, security,
  industrial inspection, quality control.

