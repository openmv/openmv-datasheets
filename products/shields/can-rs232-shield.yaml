meta:
  product_name: "CAN/RS232 Shield"
  sku: "OMV-SHIELD-CAN-RS232"
  filename: "OpenMV-CAN-RS232-Shield-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/can-rs232-shield/CAN SHIELD - FRONT CAM.jpg"

description: >
  The CAN/RS232 Shield gives your OpenMV Cam the ability to transmit RS232 signals to equipment
  and communicate over the CAN bus at the same time. You can transmit data up to 1 Mb/s via
  RS232 and 8 Mb/s via CAN (requires CAN-FD support; normal CAN maxes at 1 Mb/s). RS232 uses
  P4 (TX) and P5 (RX). CAN uses P1 (TX) and P3 (RX), with optional P2 for TX. Includes
  6\u201336 V wide-range input, robust ADC, and robust trigger I/O.

target_areas: >
  Industrial communication, automotive, equipment integration, factory automation,
  machine interfacing, PLC connectivity.

features:
  - label: "Simultaneous CAN + RS232"
    detail: "CAN bus up to 8 Mb/s (CAN-FD) or 1 Mb/s (standard). RS232 up to 1 Mb/s. Both active simultaneously."
  - label: "6\u201336 V wide-range input"
    detail: "Reverse voltage and transient surge protection. Outputs 5.4 V on VIN via OR'ing diode."
  - label: "Robust ADC input"
    detail: "0\u20135 V on P6 with \u00B136 V overvoltage protection. Optional 4\u201320 mA mode."
  - label: "Robust trigger I/O"
    detail: "0\u20135 V on P10 via SYN pin. Tolerant to -12 V, shorts to GND and 12 V."
  - label: "Configurable pins"
    detail: "All I/O pins disconnectable via solder bridges."

system_components_title: "Features"
system_components:
  - title: "Communication"
    components:
      - name: "RS232"
        details: "RS232 transceiver on P4 (TX) and P5 (RX). Up to 1 Mb/s. Disconnectable."
      - name: "CAN Bus"
        details: "CAN transceiver on P1 (TX) and P3 (RX). TX optionally movable to P2. Up to 8 Mb/s with CAN-FD, 1 Mb/s standard CAN. Disconnectable."

  - title: "Power Input"
    components:
      - name: "Wide-Range Input"
        details: "6\u201336 V with reverse voltage and transient surge protection. Outputs 5.4 V on VIN via OR'ing diode."

  - title: "ADC Input"
    components:
      - name: "AIN"
        details: "Robust 0\u20135 V ADC input on P6 (0\u20133.3 V output). Overvoltage protection to \u00B136 V. Optional 4\u201320 mA mode via 240 \u03A9 solder bridge. Disconnectable."

  - title: "Digital I/O"
    components:
      - name: "SYN / P10"
        details: "Robust 0\u20135 V digital I/O. Tolerant to -12 V, shorts to GND and 12 V. Default: open-drain input. Configurable as 0\u20135 V output. Disconnectable."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models."

