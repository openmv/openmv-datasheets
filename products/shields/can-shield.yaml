description: >
  The CAN Shield allows your OpenMV Cam to communicate with other devices on the CAN bus at
  baud rates up to 1 Mb/s. The DB9 connector connects to a normal DB9 CAN connector and also
  supports the OBDII bus layout, selectable via solder bridges on the bottom of the shield.
  The shield features an on-board voltage regulator so you can power your OpenMV Cam with
  12 V. This is the retired standalone CAN Shield \u2014 see the current CAN/RS232 Shield for
  the latest design with combined CAN and RS232.

target_areas: >
  CAN bus communication, automotive (OBDII), industrial automation, vehicle diagnostics.

features:
  - label: "CAN bus up to 1 Mb/s"
    detail: "Communicate with devices on the CAN bus at up to 1 Mb/s."
  - label: "DB9 connector"
    detail: "Standard DB9 CAN connector with OBDII bus layout option via solder bridges."
  - label: "12 V input"
    detail: "On-board voltage regulator accepts 12 V to power your OpenMV Cam."

