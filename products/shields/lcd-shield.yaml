description: >
  The LCD Shield gives your OpenMV Cam the ability to display what it sees on the go while
  not connected to your computer. It features a 1.8-inch 128x160 16-bpp (RGB565) TFT LCD
  display with a controllable backlight. Your OpenMV Cam's firmware has built-in support for
  controlling the LCD Shield using the SPI Display Class.

target_areas: >
  Portable display, field demos, on-device preview, debugging, HMI.

features:
  - label: "1.8\" TFT LCD"
    detail: "128x160 pixel, 16-bit color (RGB565)."
  - label: "Controllable backlight"
    detail: "Software-controllable backlight brightness."
  - label: "Built-in firmware support"
    detail: "Controlled via the SPI Display Class in MicroPython."

