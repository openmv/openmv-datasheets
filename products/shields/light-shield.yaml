description: >
  The Light Shield gives your OpenMV Cam the ability to illuminate what it's looking at.
  It features nine high-power white LEDs for bright, even illumination of the camera's
  field of view.

target_areas: >
  Low-light imaging, illumination, inspection lighting, barcode reading,
  close-range illumination, industrial vision.

