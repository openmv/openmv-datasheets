description: >
  The PoE Shield lets you connect your OpenMV Cam to PoE Ethernet, providing a one-cable
  solution for power and connectivity. It features a 10/100 Mb/s capable Ethernet jack with
  IEEE 802.3af PoE support providing up to ~6 W of power. The shield supplies 5.4 V via VIN
  through an OR'ing diode, allowing it to be combined with other dual header column shields.
  Peak UDP transmit performance exceeds 90 Mb/s using Python sockets with the RT1062.
  Headers do not come pre-soldered.

target_areas: >
  Network-connected vision, IP camera, remote monitoring, industrial Ethernet,
  PoE-powered deployments, one-cable installations.

features:
  - label: "10/100 Mb/s Ethernet"
    detail: "10/100 Mb/s capable Ethernet jack."
  - label: "IEEE 802.3af PoE"
    detail: "Power over Ethernet providing up to ~6 W to your OpenMV Cam."
  - label: "One-cable solution"
    detail: "Single Ethernet cable provides both power and data connectivity."
  - label: "90+ Mb/s throughput"
    detail: "Peak UDP transmit performance exceeds 90 Mb/s with RT1062."
  - label: "Shield stacking"
    detail: "Supplies 5.4 V on VIN via OR'ing diode for multi-shield combinations."

