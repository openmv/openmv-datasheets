description: >
  The Proto Shield gives you the ability to easily extend your OpenMV Cam's functionality. It
  features a 10x10 through-hole prototyping area with a 3.3 V rail and a GND rail connected
  to your OpenMV Cam's 3.3 V and GND rails. The rest of the I/O pins are left unconnected
  to let you build what you want.

target_areas: >
  Prototyping, custom circuits, sensor integration, one-off builds, education.

