meta:
  product_name: "QWIIC Shield"
  sku: "OMV-SHIELD-QWIIC"
  filename: "OpenMV-QWIIC-Shield-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/qwiic-shield/qwiic-shield-angle-web.jpg"

description: >
  The QWIIC Shield allows your OpenMV Cam to easily connect to SparkFun's plethora of QWIIC
  devices. It connects P4 (SCL) and P5 (SDA) on your OpenMV Cam to the dual QWIIC headers
  onboard, which can be used to daisy-chain your OpenMV Cam into a QWIIC (I2C) bus. The
  shield does not feature pull-up resistors \u2014 you need to enable these via software on your
  OpenMV Cam or provide them externally.

target_areas: >
  I2C sensor integration, QWIIC ecosystem, rapid prototyping, sensor daisy-chaining.

features:
  - label: "Dual QWIIC headers"
    detail: "Two QWIIC I2C connectors for daisy-chaining SparkFun QWIIC peripherals."
  - label: "P4/P5 connection"
    detail: "Connects to P4 (SCL) and P5 (SDA) on your OpenMV Cam."
  - label: "No pull-ups"
    detail: "No onboard pull-up resistors. Enable via software or provide externally."

system_components_title: "Features"
system_components:
  - title: "I2C / QWIIC"
    components:
      - name: "Connectors"
        details: "Dual QWIIC headers for daisy-chaining. Compatible with SparkFun QWIIC ecosystem."
      - name: "Pins"
        details: "P4 (SCL) and P5 (SDA)."
      - name: "Pull-ups"
        details: "No onboard pull-up resistors. Must be enabled via software (e.g., machine.Pin.PULL_UP) or provided externally."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models."

