meta:
  product_name: "RS422/RS485 Shield"
  sku: "OMV-SHIELD-RS422-RS485"
  filename: "OpenMV-RS422-RS485-Shield-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/rs422-rs485-shield/RS422-RS485 SHIELD - FRONT CAM.jpg"

description: >
  The RS422/RS485 Shield allows your OpenMV Cam to transmit data to RS422 devices or
  communicate on an RS485 bus. YA+ and ZD- are the RS485 bidirectional pins (or RS422 receiver
  pins) while A+ and B- are the RS422 transmitter pins. The shield seamlessly handles either
  RS422 or RS485 (not both simultaneously). Transceivers connect to P4 (TX) and P5 (RX).
  Includes 6\u201336 V wide-range input, robust ADC, and robust trigger I/O.

target_areas: >
  Industrial communication, building automation, long-distance serial,
  multi-drop networks, PLC connectivity, SCADA systems.

features:
  - label: "RS422 or RS485"
    detail: "Seamlessly handles either protocol. RS422: separate TX (A+/B-) and RX (YA+/ZD-). RS485: bidirectional on YA+/ZD-."
  - label: "6\u201336 V wide-range input"
    detail: "Reverse voltage and transient surge protection. Outputs 5.4 V on VIN via OR'ing diode."
  - label: "Robust ADC input"
    detail: "0\u20135 V on P6 with \u00B136 V overvoltage protection. Optional 4\u201320 mA mode."
  - label: "Robust trigger I/O"
    detail: "0\u20135 V on P10 via SYN pin. Tolerant to -12 V, shorts to GND and 12 V."

system_components_title: "Features"
system_components:
  - title: "Communication"
    components:
      - name: "RS422"
        details: "Full-duplex RS422 with separate transmitter (A+/B-) and receiver (YA+/ZD-) pairs. Connected to P4 (TX) and P5 (RX). Disconnectable."
      - name: "RS485"
        details: "Half-duplex RS485 bidirectional on YA+/ZD- pins. Connected to P4 (TX) and P5 (RX). Cannot use RS422 and RS485 simultaneously."

  - title: "Power Input"
    components:
      - name: "Wide-Range Input"
        details: "6\u201336 V with reverse voltage and transient surge protection. Outputs 5.4 V on VIN via OR'ing diode."

  - title: "ADC Input"
    components:
      - name: "AIN"
        details: "Robust 0\u20135 V ADC input on P6 (0\u20133.3 V output). Overvoltage protection to \u00B136 V. Optional 4\u201320 mA mode. Disconnectable."

  - title: "Digital I/O"
    components:
      - name: "SYN / P10"
        details: "Robust 0\u20135 V digital I/O. Tolerant to -12 V, shorts to GND and 12 V. Default: open-drain input. Configurable as output. Disconnectable."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models."

