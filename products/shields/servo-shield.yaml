meta:
  product_name: "Servo Shield"
  sku: "OMV-SHIELD-SERVO-V2 / OMV-SHIELD-SERVO-V3"
  filename: "OpenMV-Servo-Shield-Datasheet.pdf"
  modified_date: "2026-04-04"
  version: "Rev 1"
  cover_image: "boards/servo-shield/new-servo-angle.jpg"

description: >
  The Servo Shield allows your OpenMV Cam to directly control up to 4 standard hobby servos via
  P7/P8/P9/P10. Each output is buffered and boosted to 0\u20135 V. Unused outputs can be
  disconnected via solder-bridge jumpers. The shield features a wide voltage range 6\u201336 V
  input with reverse voltage and transient surge protection, capable of powering both the
  servos (up to 5 A) and the OpenMV Cam. Includes a robust 0\u20135 V ADC input on P6 with
  4\u201320 mA mode option and a robust 0\u20135 V digital I/O on P10.
  The V3 updates all I/O pins to bidirectional with 3.3 V to 5 V level shifting, uses
  lower-profile components, higher-temperature-rated caps, and powers the camera through an
  ideal diode.

target_areas: >
  Robotics, pan-tilt systems, gimbal control, actuator control, industrial automation.

features:
  - label: "4-channel servo control"
    detail: "Control up to 4 standard hobby servos via P7/P8/P9/P10. Buffered and boosted to 0\u20135 V."
  - label: "5 A servo power"
    detail: "Wide-range regulator provides up to 5 A for servos plus camera power."
  - label: "6\u201336 V wide-range input"
    detail: "Reverse voltage and transient surge protection. Outputs 5.6 V on VIN via ideal OR'ing diode."
  - label: "Robust ADC input"
    detail: "0\u20135 V ADC on P6 with overvoltage protection (\u00B136 V tested). Optional 4\u201320 mA mode via solder bridge."
  - label: "Robust trigger I/O"
    detail: "0\u20135 V digital I/O on P10. Tolerant to reverse voltage, shorts to GND and 12 V."
  - label: "V3 improvements"
    detail: "Bidirectional I/O with 3.3\u20135 V level shifting, lower-profile components, ideal diode power."

system_components_title: "Features"
system_components:
  - title: "Servo Control"
    components:
      - name: "Channels"
        details: "4 servo outputs on P7, P8, P9, P10. Each buffered and level-shifted to 0\u20135 V."
      - name: "Servo Power"
        details: "Wide-range regulator provides up to 5 A for servos."
      - name: "Disconnectable"
        details: "Each output can be disconnected via solder-bridge jumper."

  - title: "Power Input"
    components:
      - name: "Wide-Range Input"
        details: "6\u201336 V input with reverse voltage and transient surge protection. Outputs 5.6 V on VIN via ideal OR'ing diode for multi-shield stacking."

  - title: "ADC Input"
    components:
      - name: "AIN"
        details: "Robust 0\u20135 V ADC input, outputs 0\u20133.3 V on P6. Reverse voltage and overvoltage protection (tested to \u00B136 V). Optional 4\u201320 mA mode via 240 \u03A9 solder bridge. Disconnectable."

  - title: "Digital I/O"
    components:
      - name: "SYN / P10"
        details: "Robust 0\u20135 V digital I/O. Tolerant to reverse voltage (-12 V tested), shorts to GND and 12 V. Default: open-drain input on P10. Configurable as 0\u20135 V digital output. Disconnectable."

  - title: "V3 Changes"
    components:
      - name: "Bidirectional I/O"
        details: "All I/O pins (P7/P8/P9/P10) upgraded to bidirectional with 3.3 V to 5 V level shifting (V2 was unidirectional)."
      - name: "Power"
        details: "Camera powered through ideal diode to reduce heat loss."
      - name: "Components"
        details: "Lower-profile components and higher-temperature-rated capacitors."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models."

