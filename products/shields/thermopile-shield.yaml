description: >
  The Thermopile Shield gives your OpenMV Cam the ability to see heat. It features a 16x4
  pixel sensor array with a 60\u00B0 x 16\u00B0 field of view, capable of measuring object temperatures
  between -50\u00B0C and 300\u00B0C while measuring ambient room temperature (-40\u00B0C to 85\u00B0C). Your
  OpenMV Cam's firmware has built-in support for controlling the Thermopile Shield using
  the fir module.

target_areas: >
  Thermal imaging, temperature measurement, heat detection, HVAC diagnostics,
  industrial inspection, presence detection.

