  cover_image: "boards/wifi-shield/new-wifi-angle.jpg"

description: >
  The WiFi Shield gives your OpenMV Cam the ability to connect to the internet. It features
  an ATWINC1500 FCC Certified WiFi module which can transmit data at up to 48 Mbps, making
  it perfect for streaming video. Your OpenMV Cam's firmware has built-in support for
  controlling the WiFi Shield using the network module.

target_areas: >
  Internet connectivity, video streaming, IoT, remote monitoring, cloud integration,
  wireless data transfer.

features:
  - label: "ATWINC1500 WiFi"
    detail: "FCC Certified WiFi module, up to 48 Mbps data rate."
  - label: "Video streaming"
    detail: "Fast enough for real-time video streaming from your OpenMV Cam."
  - label: "Built-in firmware support"
    detail: "Controlled via the network module in MicroPython."

system_components_title: "Features"
system_components:
  - title: "WiFi Module"
    components:
      - name: "Chip"
        details: "Microchip ATWINC1500 WiFi module."
      - name: "Certification"
        details: "FCC Certified."
      - name: "Data Rate"
        details: "Up to 48 Mbps."
      - name: "Interface"
        details: "SPI connection to OpenMV Cam. Controlled via the MicroPython network module."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models. Primarily useful for older models without built-in WiFi (M4, M7, H7). Newer models (RT1062, AE3, N6) have integrated WiFi."

