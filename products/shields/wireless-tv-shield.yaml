  cover_image: "boards/wireless-tv-shield/new-wireless-tv-shield-angle-web.jpg"

description: >
  The Wireless TV Shield gives your OpenMV Cam a way to wirelessly transmit video at high
  speed over a long range. It works using a SPI to NTSC chip attached to a 5.8 GHz analog
  broadcast chip. The Wireless TV Shield is as easy to use as the LCD Shield and only requires
  init() followed by display() calls. Built-in firmware support and example code included.

target_areas: >
  FPV video, wireless video transmission, drone video, long-range video link,
  remote monitoring, RC vehicle video.

features:
  - label: "5.8 GHz wireless video"
    detail: "High-speed long-range analog video broadcast via 5.8 GHz transmitter."
  - label: "NTSC output"
    detail: "SPI to NTSC conversion, then 5.8 GHz broadcast."
  - label: "Simple API"
    detail: "init() + display() \u2014 same as LCD and TV Shields."
  - label: "Built-in support"
    detail: "Firmware support and example code included in OpenMV IDE."

system_components_title: "Features"
system_components:
  - title: "Wireless Video"
    components:
      - name: "Transmitter"
        details: "5.8 GHz analog broadcast chip for long-range wireless video."
      - name: "Video Standard"
        details: "SPI to NTSC conversion, then 5.8 GHz broadcast."
      - name: "API"
        details: "tv.init() and tv.display() in MicroPython. See TV Module documentation."

  - title: "Compatibility"
    components:
      - name: "Supported Cameras"
        details: "All OpenMV Cam models."

